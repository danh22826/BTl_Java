<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UTC Cinema – Mua Vé</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="site-header"></div>
<div class="gold-bar"></div>

<!-- Tab bar -->
<div class="tab-bar">
  <a href="mua-ve.html" class="active">MUA VÉ XEM PHIM</a>
  <a href="mua-ve.html#lich-chieu">LỊCH CHIẾU PHIM</a>
</div>

<!-- Breadcrumb -->
<nav style="padding:12px 0;background:var(--bg-beige);border-bottom:1px solid var(--border-light);">
  <div class="container" style="font-size:.85rem;color:var(--text-muted);">
    <a href="index.html" style="color:var(--accent-gold)">Trang chủ</a>
    <span> / </span>
    <span>Mua vé</span>
  </div>
</nav>

<!-- Calendar date strip -->
<section class="calendar-section">
  <div class="container">
    <div class="calendar-strip" id="calendarStrip">
      <button class="cal-nav" onclick="calShift(-7)"><i class="fas fa-chevron-left"></i></button>
      <div id="calDays" style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center;"></div>
      <button class="cal-nav" onclick="calShift(7)"><i class="fas fa-chevron-right"></i></button>
    </div>
  </div>
</section>

<!-- Main content: 2-column layout like Lotte -->
<section style="padding:32px 0;">
  <div class="container">
    <div class="schedule-layout">
      <!-- LEFT: Cinema & Showtime -->
      <div class="schedule-main">
        <!-- Filter tabs like Lotte: Lịch chiếu phim theo rạp / Danh sách phim chiếu theo rạp -->
        <div style="display:flex;gap:0;margin-bottom:24px;border-bottom:1px solid var(--border-light);">
          <button class="sidebar-tab active" id="tabByRap" onclick="switchView('rap')" style="flex:1">Lịch chiếu phim theo rạp</button>
          <button class="sidebar-tab" id="tabByMovie" onclick="switchView('movie')" style="flex:1">Danh sách phim chiếu theo rạp</button>
        </div>

        <!-- Region Tabs (ThanhPho) -->
        <h3 style="font-size:1.1rem;font-weight:700;margin-bottom:12px;">Rạp phim</h3>
        <div class="region-tabs" id="regionTabs">
          <div class="loading-spinner"><div class="spinner"></div></div>
        </div>

        <!-- Cinema chips -->
        <div class="cinema-list" id="cinemaList"></div>

        <!-- Showtime results -->
        <div id="showtimeResults">
          <div class="empty-state">
            <i class="fas fa-film"></i>
            <h3>Kính mời quý khách chọn rạp để xem lịch chiếu</h3>
          </div>
        </div>
      </div>

      <!-- RIGHT: Sidebar -->
      <div class="schedule-sidebar">
        <!-- Most Watched -->
        <div class="sidebar-widget">
          <div class="sidebar-tabs">
            <button class="sidebar-tab active" onclick="sidebarTab(this,'popular')">Xem nhiều nhất</button>
            <button class="sidebar-tab" onclick="sidebarTab(this,'rated')">Đánh giá tốt nhất</button>
          </div>
          <div id="sidebarMovies">
            <div class="loading-spinner"><div class="spinner"></div></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<div id="quick-actions"></div>
<div id="site-footer"></div>

<script src="js/shared.js"></script>
<script>
let cities = [], selectedCity = null, selectedRap = null;
let calStart = new Date(), selectedDate = formatISODate(new Date());
let viewMode = 'rap'; // 'rap' or 'movie'

document.addEventListener('DOMContentLoaded', async () => {
  initPage('mua-ve');

  // URL params
  const params = new URLSearchParams(location.search);
  if (params.get('ngay')) { selectedDate = params.get('ngay'); calStart = new Date(selectedDate); }

  renderCalendar();
  try {
    cities = await apiFetch('/thanh-pho');
    renderRegionTabs();
    loadSidebarMovies();

    // If rap param
    if (params.get('rap')) {
      // Find city for this rap
      for (const c of cities) {
        const raps = await apiFetch('/rap?maThanhPho=' + encodeURIComponent(c.maThanhPho));
        const found = raps.find(r => r.maRap === params.get('rap'));
        if (found) {
          selectCity(c.maThanhPho);
          setTimeout(() => selectRap(found.maRap), 300);
          break;
        }
      }
    }
  } catch(e) {
    document.getElementById('regionTabs').innerHTML = '<p style="color:var(--accent-red)">Lỗi tải dữ liệu</p>';
  }
});

/* ——— CALENDAR ——— */
function renderCalendar() {
  const container = document.getElementById('calDays');
  container.innerHTML = '';
  const start = new Date(calStart);
  start.setDate(start.getDate() - start.getDay()); // Start from Sunday

  for (let i = 0; i < 14; i++) {
    const d = new Date(start);
    d.setDate(start.getDate() + i);
    const iso = formatISODate(d);
    const dow = d.getDay();
    let cls = 'cal-day';
    if (iso === selectedDate) cls += ' active';
    if (dow === 0) cls += ' sunday';
    if (dow === 6) cls += ' saturday';

    // Month separator
    if (i === 0 || (d.getDate() === 1)) {
      container.innerHTML += `<div class="cal-month">${d.getMonth()+1}<small>${d.getFullYear()} ${['January','February','March','April','May','June','July','August','September','October','November','December'][d.getMonth()]}</small></div>`;
    }

    container.innerHTML += `
      <button class="${cls}" onclick="selectDate('${iso}')">
        <span class="day-name">${getDayName(d)}</span>
        <span class="day-num">${d.getDate()}</span>
      </button>`;
  }
}
function selectDate(iso) {
  selectedDate = iso;
  renderCalendar();
  if (selectedRap) loadShowtimesForRap();
}
function calShift(days) {
  calStart.setDate(calStart.getDate() + days);
  renderCalendar();
}

/* ——— REGION / CITY TABS ——— */
function renderRegionTabs() {
  const el = document.getElementById('regionTabs');
  el.innerHTML = cities.map(c => `
    <button class="region-tab${selectedCity === c.maThanhPho ? ' active' : ''}"
            onclick="selectCity('${escapeHtml(c.maThanhPho)}')">${escapeHtml(c.tenThanhPho)}</button>
  `).join('');
}

async function selectCity(maTP) {
  selectedCity = maTP;
  selectedRap = null;
  renderRegionTabs();
  document.getElementById('cinemaList').innerHTML = '<div class="loading-spinner"><div class="spinner"></div></div>';
  document.getElementById('showtimeResults').innerHTML = '';
  try {
    const raps = await apiFetch('/rap?maThanhPho=' + encodeURIComponent(maTP));
    document.getElementById('cinemaList').innerHTML = raps.map(r => `
      <button class="cinema-chip" onclick="selectRap('${escapeHtml(r.maRap)}')">${escapeHtml(r.tenRap)}</button>
    `).join('') || '<p style="color:var(--text-muted)">Chưa có rạp nào tại khu vực này</p>';
  } catch(e) {
    document.getElementById('cinemaList').innerHTML = '<p style="color:var(--accent-red)">Lỗi tải danh sách rạp</p>';
  }
}

function selectRap(maRap) {
  selectedRap = maRap;
  document.querySelectorAll('.cinema-chip').forEach(c =>
    c.classList.toggle('active', c.textContent && c.getAttribute('onclick')?.includes(maRap))
  );
  loadShowtimesForRap();
}

/* ——— LOAD SHOWTIMES ——— */
async function loadShowtimesForRap() {
  const el = document.getElementById('showtimeResults');
  if (!selectedRap || !selectedDate) return;
  el.innerHTML = '<div class="loading-spinner"><div class="spinner"></div></div>';

  try {
    const movies = await apiFetch(`/suat-chieu/tim-phim?maRap=${encodeURIComponent(selectedRap)}&ngay=${selectedDate}`);
    if (!movies.length) {
      el.innerHTML = '<div class="empty-state"><i class="fas fa-calendar-times"></i><h3>Không có suất chiếu cho ngày này</h3></div>';
      return;
    }

    let html = '';
    for (const m of movies) {
      const suats = await apiFetch(`/suat-chieu/tim-suat?maPhim=${encodeURIComponent(m.maPhim)}&maRap=${encodeURIComponent(selectedRap)}&ngay=${selectedDate}`);
      html += `
        <div class="showtime-group">
          <div class="showtime-movie-header">
            <img class="showtime-poster" src="${getPosterUrl(m.poster)}" alt="">
            <div class="showtime-movie-info">
              <h3><a href="chi-tiet-phim.html?id=${encodeURIComponent(m.maPhim)}">${escapeHtml(m.tenPhim)}</a></h3>
              <div class="movie-meta">
                ${getAgeBadge(m.doTuoiPhuHop)}
                <span>${m.thoiLuong || '?'} phút</span>
                ${m.ngonNgu ? `<span>· ${escapeHtml(m.ngonNgu)}</span>` : ''}
              </div>
            </div>
          </div>
          <p style="font-size:.8rem;color:var(--text-muted);margin-bottom:10px;">
            <i class="fas fa-info-circle"></i> Thời gian chiếu phim có thể chênh lệch 15 phút do chiếu quảng cáo
          </p>
          <div class="showtime-times">
            ${suats.map(s => `
              <a href="dat-ve.html?suat=${encodeURIComponent(s.maSuat)}" class="showtime-btn">
                ${formatTime(s.gioChieu)}
                <span class="seats-left">${s.soGheTrong != null ? s.soGheTrong + ' ghế trống' : ''}</span>
              </a>
            `).join('')}
          </div>
        </div>`;
    }
    el.innerHTML = html;
  } catch(e) {
    el.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><h3>Lỗi tải lịch chiếu</h3></div>';
  }
}

/* ——— VIEW SWITCH ——— */
function switchView(mode) {
  viewMode = mode;
  document.getElementById('tabByRap').classList.toggle('active', mode === 'rap');
  document.getElementById('tabByMovie').classList.toggle('active', mode === 'movie');
  if (selectedRap) loadShowtimesForRap();
}

/* ——— SIDEBAR MOVIES ——— */
async function loadSidebarMovies() {
  try {
    const movies = await apiFetch('/phim');
    const el = document.getElementById('sidebarMovies');
    el.innerHTML = movies.slice(0, 10).map((m, i) => `
      <div class="movie-rank-item">
        <span class="rank-badge">${getAgeBadge(m.doTuoiPhuHop)}</span>
        <a href="chi-tiet-phim.html?id=${encodeURIComponent(m.maPhim)}" class="rank-title">${escapeHtml(m.tenPhim)}</a>
      </div>
    `).join('');
  } catch(e) {}
}

function sidebarTab(btn, type) {
  btn.parentElement.querySelectorAll('.sidebar-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  // Both tabs show same data since backend doesn't differentiate
  loadSidebarMovies();
}
</script>
</body>
</html>
