<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mua Vé - UTC Cinema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet" />
    <style>
        :root {
          --nen:       #f5f0e8;
          --trang:     #ffffff;
          --do:        #e50914;
          --do-dam:    #b0070f;
          --den:       #1a1a1a;
          --xam-dam:   #3d3d3d;
          --xam:       #888;
          --xam-nhat:  #f0ebe0;
          --vang:      #c8a951;
          --border:    #ddd;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
          background: var(--nen);
          font-family: 'Barlow', sans-serif;
          color: var(--den);
        }

        /* ===== HEADER ===== */
        .header {
          background: var(--den);
          color: #fff;
          padding: 0 30px;
          display: flex;
          align-items: center;
          justify-content: space-between;
          height: 60px;
          position: sticky;
          top: 0;
          z-index: 100;
        }

        .header__logo {
          font-family: 'Barlow Condensed', sans-serif;
          font-size: 1.4rem;
          font-weight: 800;
          color: var(--do);
          letter-spacing: 2px;
          text-decoration: none;
        }

        .header__nav a {
          color: #ccc;
          text-decoration: none;
          margin-left: 20px;
          font-size: 0.85rem;
          font-weight: 600;
          letter-spacing: 1px;
          transition: color 0.2s;
        }

        .header__nav a:hover,
        .header__nav a.active { color: #fff; }

        /* ===== TAB MUA VÉ / LỊCH CHIẾU ===== */
        .page-tab {
          background: var(--den);
          display: flex;
          justify-content: center;
          gap: 0;
          border-bottom: 2px solid #333;
        }

        .page-tab__nut {
          padding: 14px 40px;
          background: none;
          border: none;
          color: #888;
          font-family: 'Barlow Condensed', sans-serif;
          font-size: 1rem;
          font-weight: 700;
          letter-spacing: 1px;
          cursor: pointer;
          border-bottom: 3px solid transparent;
          margin-bottom: -2px;
          transition: all 0.2s;
        }

        .page-tab__nut--active {
          color: #fff;
          border-bottom-color: var(--do);
        }

        /* ===== CHỌN NGÀY ===== */
        .chon-ngay {
          background: var(--den);
          display: flex;
          align-items: center;
          padding: 12px 20px;
          gap: 6px;
          overflow-x: auto;
        }

        .chon-ngay__thang {
          color: #aaa;
          font-size: 0.85rem;
          margin-right: 8px;
          white-space: nowrap;
        }

        .chon-ngay__thang strong {
          font-family: 'Barlow Condensed', sans-serif;
          font-size: 1.6rem;
          color: #fff;
          margin-right: 6px;
        }

        .chon-ngay__arrow {
          background: #333;
          border: none;
          color: #fff;
          width: 32px;
          height: 32px;
          border-radius: 4px;
          cursor: pointer;
          font-size: 0.9rem;
          flex-shrink: 0;
          transition: background 0.2s;
        }

        .chon-ngay__arrow:hover { background: #555; }

        .chon-ngay__item {
          display: flex;
          flex-direction: column;
          align-items: center;
          padding: 6px 10px;
          border-radius: 6px;
          cursor: pointer;
          min-width: 52px;
          color: #aaa;
          font-size: 0.78rem;
          transition: all 0.2s;
          flex-shrink: 0;
        }

        .chon-ngay__item:hover { background: #333; color: #fff; }

        .chon-ngay__item--active {
          background: var(--do);
          color: #fff;
          border-radius: 50%;
          width: 46px;
          height: 46px;
          min-width: 46px;
          padding: 0;
          justify-content: center;
        }

        .chon-ngay__so {
          font-family: 'Barlow Condensed', sans-serif;
          font-size: 1.2rem;
          font-weight: 700;
          line-height: 1;
        }

        /* ===== LAYOUT CHÍNH ===== */
        .trang-chinh {
          display: flex;
          max-width: 1100px;
          margin: 20px auto;
          gap: 0;
          background: var(--trang);
          border-radius: 8px;
          overflow: hidden;
          box-shadow: 0 2px 12px rgba(0,0,0,0.08);
          min-height: 450px;
        }

        /* ===== PANEL RẠP ===== */
        .panel-rap {
          width: 360px;
          flex-shrink: 0;
          border-right: 1px solid var(--border);
          overflow-y: auto;
          max-height: 500px;
        }

        .panel-rap__tieu-de {
          padding: 14px 18px;
          font-weight: 700;
          font-size: 1rem;
          border-bottom: 1px solid var(--border);
        }

        .panel-rap__yeu-thich {
          display: flex;
          align-items: center;
          justify-content: space-between;
          padding: 10px 18px;
          font-size: 0.85rem;
          color: var(--xam);
          border-bottom: 1px solid var(--border);
        }

        .panel-rap__yeu-thich-tag {
          background: var(--do);
          color: #fff;
          padding: 3px 12px;
          border-radius: 4px;
          font-size: 0.8rem;
          font-weight: 600;
        }

        .panel-rap__loai {
          display: flex;
          gap: 0;
          padding: 10px 18px;
          border-bottom: 1px solid var(--border);
        }

        .panel-rap__loai-nut {
          padding: 5px 14px;
          border: 1px solid var(--border);
          background: none;
          cursor: pointer;
          font-size: 0.82rem;
          transition: all 0.2s;
        }

        .panel-rap__loai-nut:first-child { border-radius: 4px 0 0 4px; }
        .panel-rap__loai-nut:last-child  { border-radius: 0 4px 4px 0; border-left: none; }
        .panel-rap__loai-nut--active     { background: var(--den); color: #fff; }

        /* Khu vực */
        .khu-vuc__item {
          padding: 10px 18px;
          font-size: 0.88rem;
          cursor: pointer;
          color: var(--xam-dam);
          border-bottom: 1px solid #f5f5f5;
          transition: background 0.15s;
        }

        .khu-vuc__item:hover { background: var(--xam-nhat); }
        .khu-vuc__item--active {
          background: var(--den);
          color: #fff;
          font-weight: 700;
        }

        /* Rạp con */
        .rap-con {
          display: flex;
          flex-wrap: wrap;
          gap: 6px;
          padding: 8px 18px;
          background: var(--xam-nhat);
          border-bottom: 1px solid var(--border);
        }

        .rap-con__nut {
          padding: 5px 12px;
          border: 1px solid var(--border);
          border-radius: 4px;
          background: #fff;
          cursor: pointer;
          font-size: 0.82rem;
          transition: all 0.2s;
          display: flex;
          align-items: center;
          gap: 5px;
        }

        .rap-con__nut:hover { border-color: var(--den); }
        .rap-con__nut--active {
          background: var(--den);
          color: #fff;
          border-color: var(--den);
        }

        .rap-con__check { font-size: 0.75rem; }

        /* ===== PANEL PHIM ===== */
        .panel-phim {
          flex: 1;
          border-left: 1px solid var(--border);
          overflow-y: auto;
          max-height: 500px;
        }

        .panel-phim__tieu-de {
          padding: 14px 18px;
          font-weight: 700;
          font-size: 1rem;
          border-bottom: 1px solid var(--border);
        }

        .panel-phim__tab {
          display: flex;
          border-bottom: 1px solid var(--border);
        }

        .panel-phim__tab-nut {
          flex: 1;
          padding: 10px;
          border: none;
          background: none;
          font-size: 0.85rem;
          font-weight: 600;
          cursor: pointer;
          color: var(--xam);
          border-bottom: 2px solid transparent;
          transition: all 0.2s;
        }

        .panel-phim__tab-nut--active {
          color: var(--den);
          border-bottom-color: var(--den);
        }

        /* Danh sách phim */
        .phim-item {
          display: flex;
          align-items: center;
          gap: 10px;
          padding: 11px 18px;
          cursor: pointer;
          border-bottom: 1px solid #f8f8f8;
          transition: background 0.15s;
        }

        .phim-item:hover { background: var(--xam-nhat); }

        .phim-item--active { background: #fff5f5; }
        .phim-item--mo { color: var(--xam); }

        .phim-item__do-tuoi {
          width: 26px;
          height: 26px;
          border-radius: 50%;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 0.65rem;
          font-weight: 800;
          color: #fff;
          flex-shrink: 0;
        }

        .phim-item__ten {
          font-size: 0.88rem;
          font-weight: 600;
          flex: 1;
        }

        .phim-item__check { color: var(--den); font-size: 0.85rem; }

        /* ===== THANH THÔNG TIN ĐÃ CHỌN ===== */
        .thanh-thong-tin {
          background: #3d3427;
          color: #fff;
          padding: 12px 30px;
          display: flex;
          gap: 30px;
          align-items: center;
          font-size: 0.85rem;
          max-width: 1100px;
          margin: 0 auto;
          border-radius: 0 0 8px 8px;
        }

        .thanh-thong-tin__nhan { color: #aaa; margin-right: 6px; }

        .thanh-thong-tin__tag {
          background: rgba(255,255,255,0.15);
          padding: 3px 10px;
          border-radius: 4px;
          display: inline-flex;
          align-items: center;
          gap: 6px;
          font-weight: 600;
        }

        .thanh-thong-tin__xoa {
          background: none;
          border: none;
          color: #fff;
          cursor: pointer;
          font-size: 0.8rem;
          opacity: 0.7;
          padding: 0;
        }

        .thanh-thong-tin__xoa:hover { opacity: 1; }

        /* ===== GIỜ CHIẾU ===== */
        .gio-chieu {
          max-width: 1100px;
          margin: 20px auto;
          background: var(--trang);
          border-radius: 8px;
          padding: 24px;
          box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        .gio-chieu__header {
          display: flex;
          align-items: center;
          justify-content: space-between;
          margin-bottom: 4px;
        }

        .gio-chieu__tieu-de {
          font-family: 'Barlow Condensed', sans-serif;
          font-size: 1.4rem;
          font-weight: 800;
        }

        .gio-chieu__ghi-chu {
          font-size: 0.78rem;
          color: var(--xam);
          margin-bottom: 16px;
        }

        /* Nhóm phim */
        .nhom-phim {
          background: var(--xam-nhat);
          border-radius: 6px;
          padding: 12px 16px;
          margin-bottom: 20px;
        }

        .nhom-phim__tieu-de {
          display: flex;
          align-items: center;
          gap: 8px;
          font-family: 'Barlow Condensed', sans-serif;
          font-size: 1.1rem;
          font-weight: 800;
          letter-spacing: 1px;
          cursor: pointer;
        }

        .nhom-phim__arrow { font-size: 0.8rem; color: var(--xam); }

        /* Nhóm rạp */
        .nhom-rap { margin-top: 14px; }
        .nhom-rap__ten { font-weight: 700; font-size: 0.95rem; margin-bottom: 4px; }
        .nhom-rap__loai { font-size: 0.78rem; color: var(--xam); margin-bottom: 10px; }
        .nhom-rap__loai span { margin-right: 8px; }
        .nhom-rap__loai strong { color: var(--den); }

        /* Lưới suất chiếu */
        .luoi-suat {
          display: grid;
          grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
          gap: 8px;
          margin-bottom: 14px;
        }

        .suat-item {
          border: 1px solid var(--border);
          border-radius: 4px;
          padding: 10px 8px;
          cursor: pointer;
          text-align: center;
          transition: all 0.2s;
          background: #fff;
        }

        .suat-item:hover { border-color: var(--den); background: var(--xam-nhat); }
        .suat-item--active { border-color: var(--do); background: #fff5f5; }
        .suat-item--het-gio { opacity: 0.4; cursor: not-allowed; }

        .suat-item__phong { font-size: 0.72rem; color: var(--xam); margin-bottom: 4px; }
        .suat-item__gio { font-family: 'Barlow Condensed', sans-serif; font-size: 1.2rem; font-weight: 700; }
        .suat-item__ghe { font-size: 0.72rem; color: var(--do); margin-top: 3px; }
        .suat-item__ghe--day { color: var(--xam); }

        /* Loading */
        .dang-tai {
          text-align: center;
          padding: 40px;
          color: var(--xam);
        }

        .spinner {
          width: 36px; height: 36px;
          border: 3px solid #eee;
          border-top-color: var(--do);
          border-radius: 50%;
          animation: quay 0.8s linear infinite;
          margin: 0 auto 12px;
        }

        @keyframes quay { to { transform: rotate(360deg); } }

        /* Responsive */
        @media (max-width: 768px) {
          .trang-chinh { flex-direction: column; }
          .panel-rap { width: 100%; max-height: 300px; border-right: none; border-bottom: 1px solid var(--border); }
          .thanh-thong-tin { flex-wrap: wrap; gap: 10px; }
        }
    </style>
</head>
<body>

<!-- HEADER -->
<header class="header">
    <a href="../html/main.html" class="header__logo">UTC CINEMA</a>
    <nav class="header__nav">
        <a href="../html/main.html">PHIM</a>
        <a href="#" class="active">MUA VÉ</a>
        <a href="#">RẠP CHIẾU</a>
        <a href="#">ƯU ĐÃI</a>
        <a href="#">LIÊN HỆ</a>
    </nav>
</header>

<!-- TAB -->
<div class="page-tab">
    <button class="page-tab__nut page-tab__nut--active">MUA VÉ XEM PHIM</button>
    <button class="page-tab__nut">LỊCH CHIẾU PHIM</button>
</div>

<!-- CHỌN NGÀY -->
<div class="chon-ngay" id="chon-ngay"></div>

<!-- LAYOUT CHÍNH -->
<div class="trang-chinh">

    <!-- Panel Rạp -->
    <div class="panel-rap">
        <div class="panel-rap__tieu-de">Rạp</div>
        <div class="panel-rap__yeu-thich">
            <span>Rạp chiếu phim của tôi</span>
            <span class="panel-rap__yeu-thich-tag" id="rap-yeu-thich">—</span>
        </div>
        <div class="panel-rap__loai">
            <button class="panel-rap__loai-nut panel-rap__loai-nut--active">• Tất cả</button>
            <button class="panel-rap__loai-nut">Phòng chiếu đặc biệt</button>
        </div>
        <div id="danh-sach-rap">
            <div class="dang-tai"><div class="spinner"></div>Đang tải...</div>
        </div>
    </div>

    <!-- Panel Phim -->
    <div class="panel-phim">
        <div class="panel-phim__tieu-de">Phim</div>
        <div class="panel-phim__tab">
            <button class="panel-phim__tab-nut panel-phim__tab-nut--active">Xem nhiều nhất</button>
            <button class="panel-phim__tab-nut">Đánh giá tốt nhất</button>
        </div>
        <div id="danh-sach-phim">
            <div class="dang-tai"><div class="spinner"></div>Đang tải...</div>
        </div>
    </div>

</div>

<!-- THANH THÔNG TIN ĐÃ CHỌN -->
<div class="thanh-thong-tin">
    <div>
        <span class="thanh-thong-tin__nhan">Ngày</span>
        <span id="hien-ngay">—</span>
    </div>
    <div>
        <span class="thanh-thong-tin__nhan">Rạp</span>
        <span id="hien-rap">Vui lòng chọn rạp</span>
    </div>
    <div>
        <span class="thanh-thong-tin__nhan">Phim</span>
        <span id="hien-phim">Vui lòng chọn phim</span>
    </div>
</div>

<!-- GIỜ CHIẾU -->
<div class="gio-chieu" id="gio-chieu" style="display:none">
    <div class="gio-chieu__header">
        <div class="gio-chieu__tieu-de">Giờ chiếu</div>
        <select style="padding:5px 10px;border:1px solid var(--border);border-radius:4px;font-size:0.85rem">
            <option>Tất cả</option>
            <option>2D</option>
            <option>3D</option>
        </select>
    </div>
    <div class="gio-chieu__ghi-chu">
        Thời gian chiếu phim có thể chênh lệch 15 phút do chiếu quảng cáo, giới thiệu phim ra rạp
    </div>
    <div id="noi-dung-gio-chieu">
        <div class="dang-tai"><div class="spinner"></div>Đang tải suất chiếu...</div>
    </div>
</div>

<script>
    const API = 'http://localhost:8080/api';
    const THU = ['CN','Hai','Ba','Tư','Năm','Sáu','Bảy'];

    // Trạng thái
    let ngayChon  = new Date();
    let rapChon   = null;   // { maRap, tenRap }
    let phimChon  = null;   // { maPhim, tenPhim, doTuoiPhuHop }

    // ===== FORMAT =====
    function fNgay(d) {
      return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
    }
    function fNgayAPI(d) {
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
    function mauDoTuoi(dt) {
      return { P:'#4caf50', K:'#ff9800', T13:'#2196f3', T16:'#9c27b0', T18:'#f44336' }[dt] || '#999';
    }

    // ===== CHỌN NGÀY =====
    function renderNgay() {
      const wrap = document.getElementById('chon-ngay');
      const homNay = new Date();
      let html = `
        <button class="chon-ngay__arrow" onclick="doiNgay(-1)"><i class="fas fa-chevron-left"></i></button>
        <div class="chon-ngay__thang">
          <strong>${ngayChon.getDate()}</strong>
          ${ngayChon.getFullYear()} ${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][ngayChon.getMonth()]}
        </div>`;

      for (let i = 0; i < 7; i++) {
        const d = new Date(homNay);
        d.setDate(homNay.getDate() + i);
        const active = d.toDateString() === ngayChon.toDateString();
        const thu = THU[d.getDay()];
        if (active) {
          html += `<div class="chon-ngay__item chon-ngay__item--active" onclick="chonNgay(${d.getTime()})">
            <span class="chon-ngay__so">${d.getDate()}</span>
          </div>`;
        } else {
          html += `<div class="chon-ngay__item" onclick="chonNgay(${d.getTime()})">
            <span style="font-size:0.72rem">${thu}</span>
            <span class="chon-ngay__so">${d.getDate()}</span>
          </div>`;
        }
      }
      html += `<button class="chon-ngay__arrow" onclick="doiNgay(1)"><i class="fas fa-chevron-right"></i></button>`;
      wrap.innerHTML = html;

      // Cập nhật thanh thông tin
      document.getElementById('hien-ngay').textContent =
        `${fNgay(ngayChon)}(${THU[ngayChon.getDay()]})`;
    }

    function doiNgay(buoc) {
      ngayChon.setDate(ngayChon.getDate() + buoc);
      renderNgay();
      taiSuatChieu();
    }

    function chonNgay(ts) {
      ngayChon = new Date(ts);
      renderNgay();
      taiSuatChieu();
    }

    // ===== RẠP =====
    function taiRap() {
      fetch(`${API}/rap`)
        .then(r => r.json())
        .then(data => renderRap(data))
        .catch(() => renderRapMau());
    }

    function renderRap(dsRap) {
      // Nhóm theo khu vực (dùng trường khuVuc nếu có, không thì nhóm tất cả)
      const nhom = {};
      dsRap.forEach(r => {
        const kv = r.tenKhuVuc || r.khuVuc?.tenKhuVuc || 'Tất cả';
        if (!nhom[kv]) nhom[kv] = [];
        nhom[kv].push(r);
      });

      let html = '';
      Object.keys(nhom).forEach((kv, idx) => {
        const raps = nhom[kv];
        const isFirst = idx === 0;
        html += `
          <div class="khu-vuc__item ${isFirst ? 'khu-vuc__item--active' : ''}"
               id="khu-${kv.replace(/\s/g,'_')}"
               onclick="moKhuVuc('${kv.replace(/\s/g,'_')}', this)">
            ${kv} (${raps.length})
          </div>
          <div class="rap-con" id="rap-con-${kv.replace(/\s/g,'_')}"
               style="${isFirst ? '' : 'display:none'}">
            ${raps.map(r => `
              <button class="rap-con__nut" id="rap-${r.maRap}"
                onclick="chonRap({maRap:'${r.maRap}',tenRap:'${r.tenRap}'},this)">
                ${r.tenRap}
              </button>`).join('')}
          </div>`;
      });

      document.getElementById('danh-sach-rap').innerHTML = html;
    }

    function renderRapMau() {
      // Dữ liệu mẫu khi API chưa có
      renderRap([
        { maRap:'R01', tenRap:'Hà Đông',   tenKhuVuc:'Hà Nội' },
        { maRap:'R02', tenRap:'West Lake', tenKhuVuc:'Hà Nội' },
        { maRap:'R03', tenRap:'Cantavil',  tenKhuVuc:'TP.HCM' },
        { maRap:'R04', tenRap:'Cộng Hòa', tenKhuVuc:'TP.HCM' },
      ]);
    }

    function moKhuVuc(maKhu, el) {
      document.querySelectorAll('.khu-vuc__item').forEach(e => e.classList.remove('khu-vuc__item--active'));
      document.querySelectorAll('.rap-con').forEach(e => e.style.display = 'none');
      el.classList.add('khu-vuc__item--active');
      document.getElementById(`rap-con-${maKhu}`).style.display = 'flex';
    }

    function chonRap(rap, btn) {
      rapChon = rap;
      document.querySelectorAll('.rap-con__nut').forEach(b => {
        b.classList.remove('rap-con__nut--active');
        b.innerHTML = b.textContent.trim();
      });
      btn.classList.add('rap-con__nut--active');
      btn.innerHTML = `<span class="rap-con__check">✓</span> ${rap.tenRap}`;

      document.getElementById('hien-rap').innerHTML = `
        <span class="thanh-thong-tin__tag">
          ${rap.tenRap}
          <button class="thanh-thong-tin__xoa" onclick="xoaRap()">✕</button>
        </span>`;
      document.getElementById('rap-yeu-thich').textContent = rap.tenRap;

      taiPhimTheoNgayRap();
    }

    function xoaRap() {
      rapChon = null;
      document.querySelectorAll('.rap-con__nut').forEach(b => b.classList.remove('rap-con__nut--active'));
      document.getElementById('hien-rap').textContent = 'Vui lòng chọn rạp';
      document.getElementById('rap-yeu-thich').textContent = '—';
      document.getElementById('gio-chieu').style.display = 'none';
    }

    // ===== PHIM =====
    function taiPhimTheoNgayRap() {
      if (!rapChon) return;
      const ngay = fNgayAPI(ngayChon);
      document.getElementById('danh-sach-phim').innerHTML =
        '<div class="dang-tai"><div class="spinner"></div>Đang tải phim...</div>';

      // Thử API lấy phim theo ngày + rạp
      fetch(`${API}/suat-chieu/phim?ngay=${ngay}&maRap=${rapChon.maRap}`)
        .then(r => r.json())
        .then(data => {
          if (data.length === 0) {
            // Fallback: lấy tất cả phim đang chiếu
            return fetch(`${API}/phim/dang-chieu`).then(r => r.json());
          }
          return data;
        })
        .then(data => renderPhim(data))
        .catch(() => {
          // Fallback lấy tất cả phim
          fetch(`${API}/phim`)
            .then(r => r.json())
            .then(data => renderPhim(data))
            .catch(() => {
              document.getElementById('danh-sach-phim').innerHTML =
                '<div class="dang-tai">Không thể tải danh sách phim</div>';
            });
        });
    }

    function renderPhim(dsPhim) {
      if (!dsPhim.length) {
        document.getElementById('danh-sach-phim').innerHTML =
          '<div class="dang-tai">Không có phim chiếu ngày này</div>';
        return;
      }

      document.getElementById('danh-sach-phim').innerHTML = dsPhim.map(p => `
        <div class="phim-item ${phimChon?.maPhim === p.maPhim ? 'phim-item--active' : ''}"
             id="phim-${p.maPhim}"
             onclick="chonPhim('${p.maPhim}','${p.tenPhim.replace(/'/g,'\\'')}','${p.doTuoiPhuHop}',this)">
          <div class="phim-item__do-tuoi" style="background:${mauDoTuoi(p.doTuoiPhuHop)}">
            ${p.doTuoiPhuHop}
          </div>
          <span class="phim-item__ten">${p.tenPhim}</span>
          ${phimChon?.maPhim === p.maPhim ? '<span class="phim-item__check">✓</span>' : ''}
        </div>`).join('');
    }

    function chonPhim(ma, ten, doTuoi, el) {
      phimChon = { maPhim: ma, tenPhim: ten, doTuoiPhuHop: doTuoi };

      document.querySelectorAll('.phim-item').forEach(e => {
        e.classList.remove('phim-item--active');
        e.querySelector('.phim-item__check')?.remove();
      });
      el.classList.add('phim-item--active');
      el.insertAdjacentHTML('beforeend', '<span class="phim-item__check">✓</span>');

      document.getElementById('hien-phim').innerHTML = `
        <span class="thanh-thong-tin__tag">
          ${ten}
          <button class="thanh-thong-tin__xoa" onclick="xoaPhim()">✕</button>
        </span>`;

      taiSuatChieu();
    }

    function xoaPhim() {
      phimChon = null;
      document.querySelectorAll('.phim-item').forEach(e => {
        e.classList.remove('phim-item--active');
        e.querySelector('.phim-item__check')?.remove();
      });
      document.getElementById('hien-phim').textContent = 'Vui lòng chọn phim';
      document.getElementById('gio-chieu').style.display = 'none';
    }

    // ===== SUẤT CHIẾU =====
    function taiSuatChieu() {
      if (!rapChon || !phimChon) return;

      document.getElementById('gio-chieu').style.display = 'block';
      document.getElementById('noi-dung-gio-chieu').innerHTML =
        '<div class="dang-tai"><div class="spinner"></div>Đang tải suất chiếu...</div>';

      const ngay = fNgayAPI(ngayChon);
      const now  = new Date();

      fetch(`${API}/suat-chieu?maPhim=${phimChon.maPhim}&ngay=${ngay}&maRap=${rapChon.maRap}`)
        .then(r => r.json())
        .then(data => renderSuatChieu(data, now))
        .catch(() => {
          // Dữ liệu mẫu
          renderSuatChieu([
            { maSuat:'SC001', maPhong:'Screen05', gioChieu:'13:20', soGheTrong:66, tongGhe:106 },
            { maSuat:'SC002', maPhong:'Screen07', gioChieu:'15:00', soGheTrong:81, tongGhe:116 },
            { maSuat:'SC003', maPhong:'Screen05', gioChieu:'15:30', soGheTrong:99, tongGhe:106 },
            { maSuat:'SC004', maPhong:'Screen04', gioChieu:'16:40', soGheTrong:115, tongGhe:120 },
            { maSuat:'SC005', maPhong:'Screen04', gioChieu:'18:50', soGheTrong:118, tongGhe:120 },
            { maSuat:'SC006', maPhong:'Screen05', gioChieu:'19:50', soGheTrong:84, tongGhe:106 },
            { maSuat:'SC007', maPhong:'Screen04', gioChieu:'21:00', soGheTrong:110, tongGhe:120 },
            { maSuat:'SC008', maPhong:'Screen07', gioChieu:'21:30', soGheTrong:106, tongGhe:116 },
            { maSuat:'SC009', maPhong:'Screen04', gioChieu:'23:10', soGheTrong:90, tongGhe:120 },
          ], now);
        });
    }

    function renderSuatChieu(dsSuat, now) {
      if (!dsSuat.length) {
        document.getElementById('noi-dung-gio-chieu').innerHTML =
          '<div class="dang-tai">Không có suất chiếu cho ngày này tại rạp này</div>';
        return;
      }

      // Nhóm theo phòng
      const nhomPhong = {};
      dsSuat.forEach(s => {
        const phong = s.tenPhong || s.maPhong || 'Phòng chiếu';
        if (!nhomPhong[phong]) nhomPhong[phong] = [];
        nhomPhong[phong].push(s);
      });

      let html = `
        <div class="nhom-phim">
          <div class="nhom-phim__tieu-de">
            <div class="phim-item__do-tuoi" style="background:${mauDoTuoi(phimChon.doTuoiPhuHop)};width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:0.65rem;font-weight:800;color:#fff;flex-shrink:0">
              ${phimChon.doTuoiPhuHop}
            </div>
            ${phimChon.tenPhim.toUpperCase()}
            <i class="fas fa-chevron-right nhom-phim__arrow"></i>
          </div>

          <div class="nhom-rap">
            <div class="nhom-rap__ten">${rapChon.tenRap}</div>
            <div class="nhom-rap__loai">
              <span>2D</span>
              <span>|</span>
              <span>Phụ đề</span>
            </div>`;

      // Render từng nhóm phòng
      Object.keys(nhomPhong).forEach(phong => {
        const suats = nhomPhong[phong];
        html += `
            <div class="luoi-suat">
              ${suats.map(s => {
                // Kiểm tra đã qua giờ chưa
                const [h, m] = (s.gioChieu || '00:00').split(':');
                const tgChieu = new Date(ngayChon);
                tgChieu.setHours(parseInt(h), parseInt(m), 0);
                const hetGio = tgChieu < now;
                const conTrong = s.soGheTrong || 0;
                const tong = s.tongGhe || 100;

                return `
                <div class="suat-item ${hetGio ? 'suat-item--het-gio' : ''}"
                     onclick="${hetGio ? '' : `chonSuat('${s.maSuat}','${s.gioChieu}')`}">
                  <div class="suat-item__phong">${s.maPhong || phong}</div>
                  <div class="suat-item__gio">${s.gioChieu?.substring(0,5) || '--:--'}</div>
                  <div class="suat-item__ghe ${conTrong < 10 ? 'suat-item__ghe--day' : ''}">
                    <strong>${conTrong}</strong> / ${tong} Ghế ngồi
                  </div>
                </div>`;
              }).join('')}
            </div>`;
      });

      html += `</div></div>`;
      document.getElementById('noi-dung-gio-chieu').innerHTML = html;
    }

    function chonSuat(maSuat, gioChieu) {
      // Lưu vào sessionStorage và chuyển trang chọn ghế
      sessionStorage.setItem('datVe', JSON.stringify({
        maSuat,
        gioChieu,
        ngay:    fNgay(ngayChon),
        tenRap:  rapChon.tenRap,
        maRap:   rapChon.maRap,
        maPhim:  phimChon.maPhim,
        tenPhim: phimChon.tenPhim,
        doTuoi:  phimChon.doTuoiPhuHop
      }));

      // Highlight suất đã chọn
      document.querySelectorAll('.suat-item').forEach(e => e.classList.remove('suat-item--active'));
      event.currentTarget.classList.add('suat-item--active');

      // Chuyển trang chọn ghế sau 300ms
      setTimeout(() => {
        window.location.href = `../html/chonghe.html?suat=${maSuat}`;
      }, 300);
    }

    // ===== KHỞI ĐỘNG =====
    renderNgay();
    taiRap();
</script>
</body>
</html>
