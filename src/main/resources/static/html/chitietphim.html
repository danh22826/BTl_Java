<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chi tiết phim</title>
    <link rel="stylesheet" href="../css/ChiTietPhim.css" />
</head>
<body>
<header class="site-header lotte-style">
    <div class="account-bar">
        <a href="../dangKi-dangNhap/dang_nhap.html">Đăng nhập</a>
        <span>|</span>
        <a href="../dangKi-dangNhap/dang_ki.html">Đăng ký</a>
    </div>

    <div class="lotte-logo-bar">
        <div class="lotte-logo">
            <img
                    src="../poster/logo.png"
                    alt="UTC logo"
            />
            <span>UTC CINEMA</span>
        </div>
    </div>

    <nav class="lotte-menu-bar">
        <!-- Trang chính: coi như đang ở mục PHIM -->
        <a href="main.html">PHIM</a>
        <span class="divider">|</span>
        <a href="../gia_ve/giave.html">MUA VÉ</a>
        <span class="divider">|</span>
        <a href="../menu.html">RẠP CHIẾU PHIM</a>
        <span class="divider">|</span>
        <a href="../KhuyenMai/khuyen_mai_page.html">TIN MỚI & ƯU ĐÃI</a>
        <span class="divider">|</span>
        <a href="../lienHe/lien_he.html">LIÊN HỆ</a>
    </nav>
</header>
<div class="movie-detail-page">
    <div class="movie-top">
        <div class="movie-left">
            <div class="movie-poster-box">
                <img id="movie-poster" src="" alt="Poster phim" />
            </div>
            <button class="book-btn">Đặt vé</button>
        </div>

        <div class="movie-right">
            <div class="movie-header">
                <h1 id="movie-title"></h1>
                <div class="movie-share">

                </div>
            </div>



            <div class="movie-info-row">
                <span class="label">Xếp hạng:</span>
                <span id="movie-age"></span>
            </div>
            <div class="movie-info-row">
                <span class="label">Ngày phát hành:</span>
                <span id="movie-release"></span>
            </div>
            <div class="movie-info-row">
                <span class="label">Thời lượng:</span>
                <span id="movie-basic"></span>
            </div>
            <div class="movie-info-row">
                <span class="label">Ngôn ngữ:</span>
                <span id="movie-language"></span>
            </div>
            <div class="movie-info-row">
                <span class="label">Thể loại:</span>
                <span id="movie-format"></span>
            </div>
        </div>
    </div>

    <div class="movie-summary">
        <h2>Tóm tắt</h2>
        <p id="movie-summary-text"></p>
    </div>
</div>

<script src="/js/ChiTietPhim.js"></script>
</body>
</html>
