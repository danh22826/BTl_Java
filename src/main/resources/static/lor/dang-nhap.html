<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UTC Cinema – Đăng Nhập</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div id="site-header"></div>
<div class="gold-bar"></div>

<section class="auth-section">
  <div class="auth-card">
    <div class="auth-card-image">
      <div style="text-align:center;color:#fff">
        <div style="font-size:3rem;margin-bottom:16px"><i class="fas fa-film"></i></div>
        <h2 style="font-size:2rem;font-weight:900;color:#fff;margin-bottom:8px">UTC CINEMA</h2>
        <p style="color:rgba(255,255,255,.8)">Đăng nhập để nhận nhiều ưu đãi</p>
      </div>
    </div>
    <div class="auth-card-form">
      <!-- LOGIN FORM -->
      <div id="loginForm">
        <h2>Đăng nhập</h2>
        <p>Vui lòng đăng nhập để tiếp tục</p>
        <div class="form-group">
          <label for="loginUser">Tên đăng nhập</label>
          <input type="text" id="loginUser" class="form-control" placeholder="Nhập tên đăng nhập" autocomplete="username">
          <div class="form-error" id="loginUserErr"></div>
        </div>
        <div class="form-group">
          <label for="loginPass">Mật khẩu</label>
          <input type="password" id="loginPass" class="form-control" placeholder="Nhập mật khẩu" autocomplete="current-password">
          <div class="form-error" id="loginPassErr"></div>
        </div>
        <div class="form-group">
          <div class="form-error" id="loginGlobalErr" style="display:none"></div>
        </div>
        <button class="btn btn-primary" style="width:100%;padding:14px" onclick="doLogin()" id="loginBtn">
          ĐĂNG NHẬP
        </button>
        <p style="text-align:center;margin-top:16px;font-size:.85rem;color:var(--text-muted)">
          Chưa có tài khoản? <a href="#register" onclick="showRegister()" style="color:var(--accent-red);font-weight:600">Đăng ký ngay</a>
        </p>
      </div>

      <!-- REGISTER FORM (placeholder – backend chưa có endpoint register) -->
      <div id="registerForm" style="display:none">
        <h2>Tạo tài khoản</h2>
        <p>Đăng ký để trở thành thành viên UTC Cinema</p>
        <div class="form-group">
          <label>Số điện thoại / Email</label>
          <input type="text" class="form-control" placeholder="Nhập SĐT hoặc email" id="regContact">
        </div>
        <div class="form-group">
          <label>Tên đăng nhập</label>
          <input type="text" class="form-control" placeholder="Chọn tên đăng nhập" id="regUser">
        </div>
        <div class="form-group">
          <label>Mật khẩu</label>
          <input type="password" class="form-control" placeholder="Tạo mật khẩu" id="regPass">
        </div>
        <div class="form-group">
          <label>Xác nhận mật khẩu</label>
          <input type="password" class="form-control" placeholder="Nhập lại mật khẩu" id="regPass2">
        </div>
        <button class="btn btn-primary" style="width:100%;padding:14px" onclick="doRegister()">
          ĐĂNG KÝ
        </button>
        <p style="text-align:center;margin-top:16px;font-size:.85rem;color:var(--text-muted)">
          Đã có tài khoản? <a href="#" onclick="showLogin()" style="color:var(--accent-red);font-weight:600">Đăng nhập</a>
        </p>
      </div>
    </div>
  </div>
</section>

<div id="quick-actions"></div>
<div id="site-footer"></div>

<script src="js/shared.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  initPage('');
  if (location.hash === '#register') showRegister();
  // Enter key
  document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
});

function showRegister() {
  document.getElementById('loginForm').style.display = 'none';
  document.getElementById('registerForm').style.display = 'block';
}
function showLogin() {
  document.getElementById('registerForm').style.display = 'none';
  document.getElementById('loginForm').style.display = 'block';
}

async function doLogin() {
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPass').value;
  // Reset errors
  document.querySelectorAll('.form-error').forEach(el => el.style.display = 'none');

  if (!username) {
    const el = document.getElementById('loginUserErr');
    el.textContent = 'Vui lòng nhập tên đăng nhập';
    el.style.display = 'block';
    return;
  }
  if (!password) {
    const el = document.getElementById('loginPassErr');
    el.textContent = 'Vui lòng nhập mật khẩu';
    el.style.display = 'block';
    return;
  }

  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.textContent = 'Đang đăng nhập...';

  try {
    const data = await apiFetch('/auth/login', {
      method: 'POST',
      body: JSON.stringify({ username, password }),
    });
    sessionStorage.setItem('utc_user', JSON.stringify({
      username: data.username || username,
      maKhachHang: data.maKhachHang || data.customerCode || '',
      role: data.role || 'ROLE_USER',
    }));
    showToast('Đăng nhập thành công!');
    setTimeout(() => {
      const redirect = sessionStorage.getItem('utc_redirect');
      sessionStorage.removeItem('utc_redirect');
      window.location.href = redirect || 'index.html';
    }, 800);
  } catch (e) {
    const el = document.getElementById('loginGlobalErr');
    el.textContent = 'Tên đăng nhập hoặc mật khẩu không đúng';
    el.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'ĐĂNG NHẬP';
  }
}

function doRegister() {
  showToast('Chức năng đăng ký hiện đang được phát triển. Vui lòng liên hệ quầy vé để tạo tài khoản.', 'error');
}
</script>
</body>
</html>
