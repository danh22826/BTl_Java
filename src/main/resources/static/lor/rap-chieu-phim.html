<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UTC Cinema – Rạp Chiếu Phim</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .rap-hero { background:linear-gradient(135deg,var(--bg-dark),#2a1a1e); color:#fff; padding:50px 0; text-align:center; }
    .rap-hero h1 { color:var(--accent-gold); font-size:2rem; margin-bottom:8px; }
    .rap-hero p { color:rgba(255,255,255,.7); }
    .city-filter { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; padding:24px 0; }
    .city-btn { padding:8px 20px; border:1px solid var(--border-light); border-radius:20px; font-size:.85rem; font-weight:500; background:var(--bg-white); color:var(--text-body); transition:var(--transition); }
    .city-btn.active,.city-btn:hover { background:var(--accent-red); color:#fff; border-color:var(--accent-red); }
    .rap-list { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:20px; padding:0 0 40px; }
    .rap-card { background:var(--bg-white); border-radius:var(--radius-lg); overflow:hidden; box-shadow:var(--shadow-sm); transition:var(--transition); }
    .rap-card:hover { box-shadow:var(--shadow-md); transform:translateY(-3px); }
    .rap-card-header { background:var(--accent-red); color:#fff; padding:16px 20px; display:flex; align-items:center; gap:12px; }
    .rap-card-header i { font-size:1.5rem; }
    .rap-card-header h3 { font-size:1rem; font-weight:700; }
    .rap-card-body { padding:20px; }
    .rap-detail-row { display:flex; align-items:flex-start; gap:10px; margin-bottom:12px; font-size:.85rem; color:var(--text-body); }
    .rap-detail-row i { color:var(--accent-gold); width:18px; text-align:center; margin-top:3px; }
    .rap-rooms { display:flex; flex-wrap:wrap; gap:6px; margin-top:12px; }
    .room-chip { padding:4px 12px; background:var(--bg-cream); border:1px solid var(--border-light); border-radius:12px; font-size:.75rem; font-weight:500; }
    .rap-card-actions { padding:0 20px 20px; display:flex; gap:8px; }
    .rap-card-actions .btn { font-size:.8rem; padding:8px 16px; }
    @media(max-width:768px) { .rap-list { grid-template-columns:1fr; } }
  </style>
</head>
<body>

<div id="site-header"></div>
<div class="gold-bar"></div>

<section class="rap-hero">
  <div class="container">
    <h1><i class="fas fa-film"></i> Hệ Thống Rạp UTC Cinema</h1>
    <p>Trải nghiệm điện ảnh đỉnh cao tại các rạp chiếu phim hiện đại trên toàn quốc</p>
  </div>
</section>

<nav style="padding:12px 0;background:var(--bg-beige);border-bottom:1px solid var(--border-light);">
  <div class="container" style="font-size:.85rem;color:var(--text-muted);">
    <a href="index.html" style="color:var(--accent-gold)">Trang chủ</a>
    <span> / </span>
    <span>Rạp chiếu phim</span>
  </div>
</nav>

<section style="padding:32px 0;">
  <div class="container">
    <!-- City filter -->
    <div class="city-filter" id="cityFilter">
      <button class="city-btn active" onclick="filterCity(null, this)">Tất cả</button>
    </div>

    <!-- Cinema list -->
    <div class="rap-list" id="rapList">
      <div class="loading-spinner"><div class="spinner"></div></div>
    </div>

    <!-- Cross-links -->
    <div style="text-align:center;padding:32px 0 0;display:flex;gap:16px;justify-content:center;flex-wrap:wrap;">
      <a href="phim.html" class="btn btn-outline"><i class="fas fa-film"></i> Phim đang chiếu</a>
      <a href="uu-dai.html" class="btn btn-outline"><i class="fas fa-gift"></i> Ưu đãi hấp dẫn</a>
      <a href="lien-he.html" class="btn btn-outline"><i class="fas fa-paper-plane"></i> Liên hệ</a>
    </div>
  </div>
</section>

<div id="quick-actions"></div>
<div id="site-footer"></div>

<script src="js/shared.js"></script>
<script>
let allCities = [], allRaps = [];

document.addEventListener('DOMContentLoaded', async () => {
  initPage('rap');
  try {
    allCities = await apiFetch('/thanh-pho');
    // Render city filter
    const filter = document.getElementById('cityFilter');
    allCities.forEach(c => {
      filter.innerHTML += `<button class="city-btn" onclick="filterCity('${escapeHtml(c.maThanhPho)}', this)">${escapeHtml(c.tenThanhPho)}</button>`;
    });

    // Load all cinemas
    const rapPromises = allCities.map(c => apiFetch('/rap?maThanhPho=' + encodeURIComponent(c.maThanhPho)).then(raps => raps.map(r => ({...r, city: c}))));
    const results = await Promise.all(rapPromises);
    allRaps = results.flat();
    renderRaps(allRaps);
  } catch(e) {
    document.getElementById('rapList').innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><h3>Lỗi tải dữ liệu rạp</h3></div>';
  }
});

function filterCity(maTP, btn) {
  document.querySelectorAll('.city-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (!maTP) {
    renderRaps(allRaps);
  } else {
    renderRaps(allRaps.filter(r => r.city?.maThanhPho === maTP));
  }
}

async function renderRaps(raps) {
  const el = document.getElementById('rapList');
  if (!raps.length) {
    el.innerHTML = '<div class="empty-state"><i class="fas fa-building"></i><h3>Không có rạp nào tại khu vực này</h3></div>';
    return;
  }

  let html = '';
  for (const r of raps) {
    // Try to load rooms for this cinema
    let roomsHtml = '';
    try {
      const rooms = await apiFetch('/phong-chieu?maRap=' + encodeURIComponent(r.maRap));
      if (rooms.length) {
        roomsHtml = `<div class="rap-rooms">${rooms.map(rm => `<span class="room-chip">${escapeHtml(rm.tenPhong)}</span>`).join('')}</div>`;
      }
    } catch(e) {}

    html += `
      <div class="rap-card">
        <div class="rap-card-header">
          <i class="fas fa-building"></i>
          <h3>${escapeHtml(r.tenRap)}</h3>
        </div>
        <div class="rap-card-body">
          <div class="rap-detail-row">
            <i class="fas fa-map-marker-alt"></i>
            <span>${escapeHtml(r.diaChi || 'Chưa cập nhật')}</span>
          </div>
          <div class="rap-detail-row">
            <i class="fas fa-city"></i>
            <span>${escapeHtml(r.city?.tenThanhPho || '')}</span>
          </div>
          ${roomsHtml}
        </div>
        <div class="rap-card-actions">
          <a href="mua-ve.html?rap=${encodeURIComponent(r.maRap)}" class="btn btn-primary">Xem lịch chiếu</a>
          <a href="mua-ve.html?rap=${encodeURIComponent(r.maRap)}" class="btn btn-outline">Mua vé</a>
        </div>
      </div>`;
  }
  el.innerHTML = html;
}
</script>
</body>
</html>
